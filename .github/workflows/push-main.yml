name: "Main Branch Build"

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout action code
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github
      - name: Run Expo EAS Build & Submit
        uses: ./.github/actions/expo-eas-build-submit
        with:
          platform: ios
          profile: production
          expo_token: ${{ secrets.EXPO_TOKEN }}
          cert_password: ${{ secrets.CERT_PASSWORD }}
          asc_api_key_id: ${{ secrets.ASC_API_KEY_ID }}
          asc_api_key_issuer_id: ${{ secrets.ASC_API_KEY_ISSUER_ID }}
          ios_cert_decrypt_key: ${{ secrets.IOS_CERT_DECRYPT_KEY }}
          ios_cert_decrypt_key_2: ${{ secrets.IOS_CERT_DECRYPT_KEY_2 }}
          commit_message: ${{ github.event.head_commit.message }}