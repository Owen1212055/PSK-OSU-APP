name: 'expo-eas-build-submit'
description: 'Build and submit Expo app using EAS with CI-managed secrets'
inputs:
  platform:
    required: false
    default: 'ios'
  profile:
    required: false
    default: 'production'
  expo_token:
    required: true
  cert_password:
    required: true
  asc_api_key_id:
    required: true
  asc_api_key_issuer_id:
    required: true
  ios_cert_decrypt_key:
    required: false
  ios_cert_decrypt_key_2:
    required: false
  commit_message:
    required: false

runs:
  using: 'composite'
  steps:
    - name: Setup Xcode
      if: ${{ inputs.platform == 'ios' }}
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
    - name: Checkout repo
      uses: actions/checkout@v4
    - name: Decrypt certificate files
      if: ${{ inputs.platform == 'ios' }}
      shell: bash
      run: ./decrypt_secret.sh
      working-directory: ./ios/certs
      env:
        IOS_CERT_DECRYPT_KEY: ${{ inputs.ios_cert_decrypt_key }}
        IOS_CERT_DECRYPT_KEY_2: ${{ inputs.ios_cert_decrypt_key_2 }}
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '23'
    - name: Setup Expo & EAS
      uses: expo/expo-github-action@8.2.1
      with:
        token: ${{ inputs.expo_token }}
        expo-version: latest
        eas-version: latest
    - name: 🏗 Install EAS local builds
      shell: bash
      run: npm i eas-cli-local-build-plugin
    - name: Build app
      shell: bash
      run: |
        npx expo install expo-dev-client
        eas build --local --non-interactive \
          --platform=${{ inputs.platform }} \
          --profile=${{ inputs.profile }} \
          --output="app.${{ inputs.platform == 'ios' && 'ipa' || 'apk' }}"
    - name: Submit app
      shell: bash
      env:
        ASC_API_KEY_ID: ${{ inputs.asc_api_key_id }}
        ASC_API_KEY_ISSUER_ID: ${{ inputs.asc_api_key_issuer_id }}
      run: |
        eas submit \
          --platform=${{ inputs.platform }} \
          --non-interactive \
          --path="app.${{ inputs.platform == 'ios' && 'ipa' || 'apk' }}" \
          --profile=${{ inputs.profile }} \
          --what-to-test="${{ inputs.commit_message }}"